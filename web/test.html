<!DOCTYPE html>
<html class="no-js" lang="en">
<head>
  <meta charset="utf-8">
  <title>KnowWhere Search Playground</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Favicon is injected via components/favicon.html -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/paginationjs/2.1.5/pagination.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/style.css" media="all">
</head>
<body class="kw-theme-light content-page--search-empty">

<script>
  // Load GitHub corner + favicon components from `components/` and insert into the page.
  document.addEventListener('DOMContentLoaded', async function () {
    try {
      const [cornerRes, faviconRes] = await Promise.all([
        fetch('components/github-corner.html'),
        fetch('components/favicon.html')
      ]);

      if (cornerRes && cornerRes.ok) {
        const cornerText = await cornerRes.text();
        const wrapper2 = document.createElement('div');
        wrapper2.innerHTML = cornerText;
        const node2 = wrapper2.firstElementChild;
        if (node2) document.body.appendChild(node2);
      }

      if (faviconRes && faviconRes.ok) {
        const favText = await faviconRes.text();
        const headWrapper = document.createElement('div');
        headWrapper.innerHTML = favText;
        Array.from(headWrapper.children).forEach(ch => document.head.appendChild(ch));
      }

      // Notify any scripts that components were loaded
      document.dispatchEvent(new Event('componentsLoaded'));
    } catch (e) {
      console.error('Failed to load components:', e);
    }
  });
</script>

<script>
  // Demo stage default API base (GitHub Pages). Set this before publishing.
  // Example: window.__KW_DEMO_API_BASE = 'https://api.yourdomain.tld';
  window.__KW_DEMO_API_BASE = window.__KW_DEMO_API_BASE || '';
</script>

<div class="overflow-hidden content-section" id="content-playground">
  <div class="search-empty-hero">
    <a href="./index.html" aria-label="KnowWhere home" title="KnowWhere">
      <img class="search-empty-hero__logo" src="images/logo.png" alt="KnowWhere">
    </a>
  </div>
  <div class="card search-card" style="margin-bottom: 14px;">
    <div class="card__content">
      <div class="search-row" style="gap: 10px; flex-wrap: wrap;">
        <div style="display:flex; flex-direction:column; gap:6px; min-width: 280px; flex: 1;">
          <label for="api-base" class="text-muted small" style="margin:0;">API base</label>
          <input id="api-base" type="text" class="search-input" placeholder="https://your-api-host (demo) or /api (local)" value="">
        </div>
      </div>
      <div class="text-muted small" style="margin-top: 10px;">
        Tip: append <code>?stage=demo&amp;apiBase=https://&lt;host&gt;</code> to point the UI at your deployed proxy.
      </div>
    </div>
  </div>
  <div class="card search-card">
    <div class="card__content">
      <div class="search-row">
        <a href="./index.html" aria-label="KnowWhere home" title="KnowWhere">
          <img class="search-top-logo" src="images/logo.png" alt="KnowWhere">
        </a>
        <input id="query" type="text" class="search-input" placeholder="Search for papers..." value="graph neural networks">
        <div class="search-actions">
          <button id="search-btn" class="btn btn-primary">Search</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="overflow-hidden content-section results-columns">
  <section class="results-column results-column--lex" aria-label="Lexical results">
    <div class="results-column__title">Standard Search</div>
    <div class="results-header">
      <div id="pagination-top-lex" class="pagination-top"></div>
    </div>
    <div id="results-summary-lex" class="text-muted small"></div>
    <div id="results-list-lex" class="results-grid"></div>
    <div id="pagination-lex" class="pagination-bottom"></div>
  </section>

  <section class="results-column" aria-label="Hybrid results">
    <div class="results-column__title">KnowWhere Search</div>
    <div class="results-header">
      <div id="pagination-top-hybrid" class="pagination-top"></div>
    </div>
    <div id="results-summary-hybrid" class="text-muted small"></div>
    <div id="results-list-hybrid" class="results-grid"></div>
    <div id="pagination-hybrid" class="pagination-bottom"></div>
  </section>
</div>

<div id="kw-toast-host" class="kw-toast-host" aria-live="polite" aria-atomic="true"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/paginationjs/2.1.5/pagination.min.js"></script>
<script src="js/test.js"></script>
</body>
</html>
